name: Python tests

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Test with pytest
      run: |
        # We skip model-dependent tests in CI as downloading 2.4GB is too heavy for standard runners
        # or we could mock the model. For now, just a sanity check.
        pytest tests/ -k "not happy_path and not integration"
